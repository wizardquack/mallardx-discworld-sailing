id = "net.mallard.discworld-sailing"
name = "Discworld Sailing"
version = "0.5.9"
description = "A Discworld sailing-mission plugin for opinionated highlights and a stage/xp tracking panel"
language = "lua"
entry = "src/main.lua"
mallard_api_version = "1.0"
minimum_app_version = "0.10.0"
authors = ["Wizard Quack"]
license = "MIT"

[worlds]
match = ["discworld.starturtle.net:*"]

[panels.sailing]
title              = "Sailing"
entry              = "ui/sailing.html"
default_dock       = "right"
default_size       = { width = 240, height = 240 }

[[keymaps]]
name = "sailing-numpad"
[[keymaps.bindings]]
combo = "numpad8"
send  = "fore"
[[keymaps.bindings]]
combo = "numpad2"
send  = "aft"
[[keymaps.bindings]]
combo = "numpad4"
send  = "port"
[[keymaps.bindings]]
combo = "numpad6"
send  = "starboard"
[[keymaps.bindings]]
combo = "numpad7"
send  = "port fore"
[[keymaps.bindings]]
combo = "numpad9"
send  = "starboard fore"
[[keymaps.bindings]]
combo = "numpad1"
send  = "port aft"
[[keymaps.bindings]]
combo = "numpad3"
send  = "starboard aft"

[settings.activate_voyage_keymap]
type = "bool"
default = true
label = "Use sailing-numpad keymap during voyages"
description = "When on, the built-in 'sailing-numpad' keymap layer is activated at voyage start and deactivated at voyage end. Edit its bindings in Settings → Keymaps. Turn off to leave your keymap untouched during voyages."
